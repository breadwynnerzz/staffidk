<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Brick City RP internal staff handbook, expectations, procedures, and leadership documentation."
    />
    <title>Brick City RP Staff Handbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=brickcity-red-staff" />
  </head>
  <body>
    <div class="site-shell">
      <aside class="sidebar" id="sidebar" aria-label="Staff handbook navigation">
        <div class="sidebar-brand">
          <a class="brand-mark" href="#/staff-introduction" aria-label="Brick City RP Staff Handbook">
            <img src="https://rules.brickcityrp.store/assets/logo2.png" alt="Brick City RP logo" />
          </a>
          <div>
            <strong>Brick City RP Staff</strong>
            <span>Internal Documentation</span>
          </div>
        </div>

        <label class="sidebar-search" for="sidebar-filter">
          <span aria-hidden="true">⌕</span>
          <input id="sidebar-filter" type="search" placeholder="Find pages..." autocomplete="off" />
        </label>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </aside>

      <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

      <main class="main-frame">
        <header class="topbar">
          <button class="icon-button mobile-menu" id="menu-toggle" type="button" aria-label="Open menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <a class="topbar-title" href="#/staff-introduction">Documentation</a>

          <div class="topbar-actions">
            <button class="search-trigger" id="search-trigger" type="button">
              <span>Search docs</span>
              <kbd>Ctrl</kbd><kbd>K</kbd>
            </button>
            <a class="quick-link" href="https://brickcityrp.store/" target="_blank" rel="noreferrer">Website</a>
            <a class="quick-link quick-link-red" href="https://discord.gg/brickcityrp" target="_blank" rel="noreferrer">Join Discord</a>
          </div>
        </header>

        <div class="content-grid">
          <article class="doc-card">
            <div class="doc-progress" id="doc-progress"></div>
            <div class="page-transition" id="page-transition">
              <div id="docContent" class="markdown-body" aria-live="polite"></div>
              <footer class="doc-footer" id="pageNav" aria-label="Previous and next pages"></footer>
            </div>
          </article>

          <aside class="toc-panel" aria-label="On this page">
            <div class="toc-card">
              <strong>On this page</strong>
              <nav id="toc"></nav>
            </div>
          </aside>
        </div>
      </main>
    </div>

    <a class="discord-corner" href="https://discord.gg/brickcityrp" target="_blank" rel="noreferrer" aria-label="Join Brick City RP Discord">
      <img src="https://rules.brickcityrp.store/assets/serveroverlay.png" alt="discord.gg/brickcityrp" />
    </a>

    <section class="search-modal" id="search-modal" aria-hidden="true" hidden>
      <div class="search-backdrop" id="search-backdrop"></div>
      <div class="search-box" role="dialog" aria-modal="true" aria-labelledby="search-title">
        <div class="search-input-row">
          <span aria-hidden="true">⌕</span>
          <label class="sr-only" for="search-input" id="search-title">Search documentation</label>
          <input
            id="search-input"
            type="search"
            placeholder="Search documentation"
            autocomplete="off"
          />
          <button class="icon-button" id="close-search" type="button" aria-label="Close search">×</button>
        </div>
        <div class="search-results" id="search-results"></div>
      </div>
    </section>

    <script src="app.js?v=brickcity-red-staff"></script>
  </body>
</html>
